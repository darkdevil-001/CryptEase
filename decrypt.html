{% extends "base.html" %}

{% block content %}
<h2 class="page-title">Decryption Tool</h2>

<div class="tool-grid">
    <section class="card">
        <form method="POST" action="{{ url_for('decrypt') }}" class="crypto-form">
            <div class="field">
                <label>Enter Cipher Text</label>
                <textarea name="input_text" required></textarea>
            </div>

            <div class="field">
                <label>Select Algorithm</label>
                <select name="algorithm" id="algo" onchange="toggleShift()">
                    <option value="caesar">Caesar Cipher</option>
                    <option value="rsa">RSA</option>
                </select>
            </div>

            <div id="shift-box" class="field">
                <label>Shift (Caesar)</label>
                <input type="number" name="shift" value="3">
            </div>

            <button type="submit" class="main-btn">Decrypt</button>
        </form>
    </section>

    <section class="card output-card">
        <div class="output-header">
            <h3>Plain Text</h3>
            <div class="output-controls">
                {% if output %}
                <span class="chip">Ready</span>
                <button type="button" class="copy-btn" onclick="copyToClipboard('output-decrypt')">Copy</button>
                {% else %}
                <span class="chip chip-muted">Waiting</span>
                {% endif %}
            </div>
        </div>
        <textarea id="output-decrypt" readonly placeholder="Your decrypted result will appear here.">{{ output or "" }}</textarea>
    </section>
</div>

<script>
function toggleShift() {
    let algo = document.getElementById("algo").value;
    let box = document.getElementById("shift-box");

    if (algo === "caesar") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

// Copy to clipboard function
function copyToClipboard(elementId) {
    const textArea = document.getElementById(elementId);
    if (!textArea || !textArea.value) {
        alert("Nothing to copy!");
        return;
    }

    textArea.select();
    document.execCommand("copy");
    
    // Visual feedback
    const btn = event.target;
    const originalText = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => {
        btn.textContent = originalText;
    }, 2000);
}

// Run when page loads
document.addEventListener("DOMContentLoaded", toggleShift);
</script>
{% endblock %}
